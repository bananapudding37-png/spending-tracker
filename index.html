<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Duitku — Multi-User Spending Tracker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --bg: #0f0e11;
        --surface: #1a1820;
        --surface2: #221f2a;
        --border: #2e2a38;
        --accent: #c9a96e;
        --accent2: #7c6fcd;
        --green: #56c496;
        --red: #e86c6c;
        --text: #f0ecf8;
        --muted: #8a84a0;
        --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        font-size: 14px;
      }

      /* AUTH SCREEN */
      #auth-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .auth-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px;
        width: 100%;
        max-width: 400px;
        box-shadow: var(--card-shadow);
      }
      .auth-logo {
        font-family: "DM Serif Display", serif;
        font-size: 28px;
        color: var(--accent);
        text-align: center;
        margin-bottom: 8px;
      }
      .auth-subtitle {
        color: var(--muted);
        text-align: center;
        margin-bottom: 24px;
        font-size: 13px;
      }
      .auth-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 10px;
      }
      .auth-tabs button {
        background: none;
        border: none;
        color: var(--muted);
        font-weight: 600;
        cursor: pointer;
        padding: 8px 12px;
        transition: color 0.2s;
      }
      .auth-tabs button.active {
        color: var(--accent);
      }

      /* MAIN APP */
      #app-container {
        display: none;
      }

      header {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surface);
        position: sticky;
        top: 0;
        z-index: 100;
        gap: 12px;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .user-email {
        font-size: 12px;
        color: var(--muted);
        display: none;
      }
      @media (min-width: 600px) {
        .user-email { display: block; }
      }

      .logo {
        font-family: "DM Serif Display", serif;
        font-size: 20px;
        color: var(--accent);
        letter-spacing: 0.5px;
        white-space: nowrap;
      }

      .month-switcher {
        display: flex;
        align-items: center;
        gap: 0;
        background: var(--surface2);
        border: 1px solid var(--accent);
        border-radius: 10px;
        overflow: hidden;
      }
      .month-switcher button {
        background: none;
        border: none;
        color: var(--accent);
        width: 36px;
        height: 36px;
        cursor: pointer;
        font-size: 18px;
        transition: background 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .month-switcher button:hover {
        background: rgba(201, 169, 110, 0.15);
      }
      #current-month-label {
        font-family: "DM Serif Display", serif;
        font-size: 15px;
        color: var(--accent);
        min-width: 120px;
        text-align: center;
        padding: 0 4px;
        letter-spacing: 0.3px;
      }

      nav {
        display: flex;
        gap: 2px;
        padding: 0 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      nav::-webkit-scrollbar { display: none; }
      nav button {
        background: none;
        border: none;
        color: var(--muted);
        padding: 12px 14px;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 500;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        white-space: nowrap;
      }
      nav button.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      main {
        padding: 16px;
        max-width: 900px;
        margin: 0 auto;
      }
      .tab-panel { display: none; }
      .tab-panel.active { display: block; }

      .month-banner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(135deg, rgba(201, 169, 110, 0.12), rgba(124, 111, 205, 0.08));
        border: 1px solid rgba(201, 169, 110, 0.3);
        border-radius: 12px;
        padding: 12px 16px;
        margin-bottom: 16px;
      }
      .month-banner-label {
        font-family: "DM Serif Display", serif;
        font-size: 18px;
        color: var(--accent);
      }
      .month-banner-sub {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .month-banner-nav {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .month-banner-nav button {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        width: 28px;
        height: 28px;
        border-radius: 7px;
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px 18px;
        box-shadow: var(--card-shadow);
        margin-bottom: 14px;
      }
      .card-title {
        font-family: "DM Serif Display", serif;
        font-size: 15px;
        color: var(--accent);
        margin-bottom: 14px;
        letter-spacing: 0.3px;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-bottom: 14px;
      }
      @media (min-width: 600px) {
        .stat-grid { grid-template-columns: repeat(3, 1fr); }
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
        position: relative;
        overflow: hidden;
      }
      .stat-card::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
      }
      .stat-card.income::before { background: var(--green); }
      .stat-card.fixed::before { background: #e8a46c; }
      .stat-card.spent::before { background: var(--accent); }
      .stat-card.savings::before { background: var(--accent2); }
      .stat-card.balance::before { background: var(--green); }

      .stat-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
        margin-bottom: 5px;
      }
      .stat-value {
        font-family: "DM Serif Display", serif;
        font-size: 20px;
        color: var(--text);
      }
      .stat-sub {
        font-size: 10px;
        color: var(--muted);
        margin-top: 3px;
      }
      .progress-wrap {
        background: var(--surface2);
        border-radius: 99px;
        height: 5px;
        margin-top: 8px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        border-radius: 99px;
        transition: width 0.4s ease;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }
      @media (min-width: 700px) {
        .two-col { grid-template-columns: 1fr 1fr; }
      }

      .form-row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }
      .form-group {
        flex: 1;
        min-width: 100px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .form-group label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--muted);
      }
      input, select {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 9px;
        color: var(--text);
        padding: 9px 12px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        width: 100%;
        outline: none;
      }
      input:focus { border-color: var(--accent); }

      .btn {
        padding: 9px 18px;
        border-radius: 9px;
        border: none;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 600;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .btn-primary { background: var(--accent); color: #0f0e11; }
      .btn-primary:hover { background: #d4b47e; }
      .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
      .btn-danger { background: transparent; color: var(--red); border: 1px solid transparent; font-size: 12px; }

      .tx-list { display: flex; flex-direction: column; gap: 7px; }
      .tx-item {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .tx-cat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
      .tx-info { flex: 1; min-width: 0; }
      .tx-cat-badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; background: var(--border); color: var(--muted); }
      .tx-amount { font-family: "DM Serif Display", serif; font-size: 15px; margin-left: auto; }

      .fix-table { width: 100%; border-collapse: collapse; }
      .fix-table th { text-align: left; font-size: 10px; color: var(--muted); padding: 0 0 8px; border-bottom: 1px solid var(--border); }
      .fix-table td { padding: 8px 0; border-bottom: 1px solid rgba(46, 42, 56, 0.5); font-size: 13px; }

      .trend-table { width: 100%; border-collapse: collapse; font-size: 12px; }
      .trend-table td { padding: 8px 10px; border-bottom: 1px solid rgba(46, 42, 56, 0.5); text-align: right; color: var(--muted); }

      #toast {
        position: fixed; bottom: 20px; right: 20px;
        background: var(--green); color: #0f0e11;
        padding: 9px 16px; border-radius: 10px;
        font-size: 13px; font-weight: 600;
        opacity: 0; transform: translateY(10px);
        transition: all 0.3s; pointer-events: none; z-index: 999;
      }
      #toast.show { opacity: 1; transform: translateY(0); }
      #toast.error { background: var(--red); color: #fff; }

      #loading-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(15, 14, 17, 0.8);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 1000; display: none;
      }
      #loading-overlay.active { display: flex; }
      .spinner { width: 40px; height: 40px; border: 4px solid var(--surface2); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- ── AUTH SCREEN ── -->
    <div id="auth-screen">
      <div class="auth-card">
        <div class="auth-logo">✦ Duitku</div>
        <div class="auth-subtitle">Sign in to sync your spending data</div>
        
        <div class="auth-tabs">
          <button id="tab-login" class="active" onclick="toggleAuthTab('login')">Login</button>
          <button id="tab-signup" onclick="toggleAuthTab('signup')">Sign Up</button>
        </div>

        <div class="form-group" style="margin-bottom: 12px">
          <label>Email</label>
          <input type="email" id="auth-email" placeholder="hello@example.com" />
        </div>
        <div class="form-group" style="margin-bottom: 24px">
          <label>Password</label>
          <input type="password" id="auth-password" placeholder="••••••••" />
        </div>

        <button id="auth-btn" class="btn btn-primary" style="width: 100%; padding: 12px" onclick="handleAuth()">
          Login
        </button>
      </div>
    </div>

    <!-- ── MAIN APP CONTAINER ── -->
    <div id="app-container">
      <div id="loading-overlay">
        <div class="spinner"></div>
        <div style="margin-top: 12px">Syncing...</div>
      </div>

      <header>
        <div class="logo">✦ Duitku</div>
        <div class="month-switcher">
          <button onclick="changeMonth(-1)" title="Previous month">‹</button>
          <span id="current-month-label"></span>
          <button onclick="changeMonth(1)" title="Next month">›</button>
        </div>
        <div class="header-right">
          <span class="user-email" id="header-user-email"></span>
          <button class="btn btn-ghost" onclick="handleLogout()" style="padding: 6px 12px; font-size: 11px">Logout</button>
        </div>
      </header>

      <nav>
        <button class="active" onclick="showTab('overview', this)">Overview</button>
        <button onclick="showTab('log', this)">Log Entry</button>
        <button onclick="showTab('fixed', this)">Fixed Expenses</button>
        <button onclick="showTab('summary', this)">Month Summary</button>
        <button onclick="showTab('trends', this)">Trends</button>
      </nav>

      <main>
        <!-- ── OVERVIEW ── -->
        <div id="tab-overview" class="tab-panel active">
          <div class="month-banner">
            <div>
              <div class="month-banner-label" id="overview-month-title"></div>
              <div class="month-banner-sub">Overview</div>
            </div>
            <div class="month-banner-nav">
              <button onclick="changeMonth(-1)">‹</button>
              <button onclick="changeMonth(1)">›</button>
            </div>
          </div>
          <div class="stat-grid" id="stat-cards"></div>
          <div class="two-col">
            <div class="card">
              <div class="card-title">Spending by Category</div>
              <div id="cat-breakdown"></div>
            </div>
            <div class="card">
              <div class="card-title">Budget vs Actual</div>
              <div class="chart-wrap"><canvas id="budget-chart"></canvas></div>
            </div>
          </div>
          <div class="card">
            <div class="card-title">Recent Transactions</div>
            <div id="recent-tx"></div>
          </div>
        </div>

        <!-- ── LOG ENTRY ── -->
        <div id="tab-log" class="tab-panel">
          <div class="month-banner">
            <div>
              <div class="month-banner-label" id="log-month-title"></div>
              <div class="month-banner-sub">Transaction Log</div>
            </div>
          </div>
          <div class="card add-tx-panel" style="border-style: dashed">
            <div class="card-title">Add Transaction</div>
            <div class="form-row">
              <div class="form-group" style="max-width: 130px"><label>Amount (RM)</label><input type="number" id="tx-amount" placeholder="0.00" step="0.01" /></div>
              <div class="form-group"><label>Category</label><select id="tx-cat"></select></div>
              <div class="form-group" style="max-width: 145px"><label>Date</label><input type="date" id="tx-date" /></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Remarks</label><input type="text" id="tx-remark" placeholder="e.g. lunch" onkeydown="if(event.key==='Enter') addTransaction()" /></div>
              <button class="btn btn-primary" onclick="addTransaction()" style="height: 38px; margin-top: 18px">+ Add</button>
            </div>
          </div>
          <div class="card">
            <div class="card-title">All Transactions <span id="tx-count" style="font-size: 11px; color: var(--muted); font-family: sans-serif; float: right"></span></div>
            <div id="all-tx"></div>
          </div>
        </div>

        <!-- ── FIXED EXPENSES ── -->
        <div id="tab-fixed" class="tab-panel">
          <div class="month-banner">
            <div>
              <div class="month-banner-label" id="fixed-month-title"></div>
              <div class="month-banner-sub">Income & Budgets</div>
            </div>
          </div>
          <div class="two-col">
            <div class="card">
              <div class="card-title">Income</div>
              <div class="form-row">
                <div class="form-group"><label>Net Salary</label><input type="number" id="fix-income" /></div>
                <div class="form-group"><label>Extra</label><input type="number" id="fix-extra-income" /></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>Savings Target</label><input type="number" id="fix-savings" /></div>
              </div>
            </div>
            <div class="card">
              <div class="card-title">Category Budgets</div>
              <div id="cat-budget-inputs"></div>
              <button class="btn btn-ghost" onclick="addCatBudget()" style="margin-top: 8px; width: 100%">+ Add Category</button>
            </div>
          </div>
          <div class="card">
            <div class="card-title">Fixed Bills</div>
            <table class="fix-table">
              <thead><tr><th>Item</th><th>Budgeted</th><th>Actual</th><th></th></tr></thead>
              <tbody id="fixed-table-body"></tbody>
            </table>
            <button class="btn btn-ghost" onclick="addFixedRow()" style="margin-top: 10px; width: 100%">+ Add Row</button>
            <div style="margin-top: 12px; text-align: right"><button class="btn btn-primary" onclick="saveFixed()">Save This Month</button></div>
          </div>
        </div>

        <!-- ── MONTH SUMMARY ── -->
        <div id="tab-summary" class="tab-panel">
          <div class="month-banner"><div class="month-banner-label" id="summary-month-title"></div></div>
          <div id="summary-content"></div>
        </div>

        <!-- ── TRENDS ── -->
        <div id="tab-trends" class="tab-panel">
          <div class="card"><div class="card-title">Spending Trends</div><div class="chart-wrap"><canvas id="trend-chart"></canvas></div></div>
          <div class="card"><div id="trend-table-wrap"></div></div>
        </div>
      </main>
    </div>

    <div id="toast"></div>

    <script>
      /**
       * SUPABASE MULTI-USER SQL SCHEMA:
       * 
       * -- Run these in the Supabase SQL Editor. 
       * -- These tables use auth.uid() to automatically isolate data.
       * 
       * CREATE TABLE monthly_settings (
       *   month_key TEXT NOT NULL,
       *   user_id UUID NOT NULL DEFAULT auth.uid() REFERENCES auth.users,
       *   income NUMERIC DEFAULT 0,
       *   extra_income NUMERIC DEFAULT 0,
       *   savings NUMERIC DEFAULT 0,
       *   PRIMARY KEY (month_key, user_id)
       * );
       * ALTER TABLE monthly_settings ENABLE ROW LEVEL SECURITY;
       * CREATE POLICY "Users only see own settings" ON monthly_settings FOR ALL USING (auth.uid() = user_id);
       * 
       * CREATE TABLE invest_subs (
       *   id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
       *   month_key TEXT NOT NULL,
       *   user_id UUID NOT NULL DEFAULT auth.uid() REFERENCES auth.users,
       *   name TEXT,
       *   amount NUMERIC DEFAULT 0
       * );
       * ALTER TABLE invest_subs ENABLE ROW LEVEL SECURITY;
       * CREATE POLICY "Users only see own invest" ON invest_subs FOR ALL USING (auth.uid() = user_id);
       * 
       * CREATE TABLE fixed_expenses (
       *   id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
       *   month_key TEXT NOT NULL,
       *   user_id UUID NOT NULL DEFAULT auth.uid() REFERENCES auth.users,
       *   name TEXT,
       *   budgeted NUMERIC DEFAULT 0,
       *   actual NUMERIC
       * );
       * ALTER TABLE fixed_expenses ENABLE ROW LEVEL SECURITY;
       * CREATE POLICY "Users only see own fixed" ON fixed_expenses FOR ALL USING (auth.uid() = user_id);
       * 
       * CREATE TABLE categories (
       *   id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
       *   month_key TEXT NOT NULL,
       *   user_id UUID NOT NULL DEFAULT auth.uid() REFERENCES auth.users,
       *   name TEXT,
       *   budget NUMERIC DEFAULT 0,
       *   sort_order INT
       * );
       * ALTER TABLE categories ENABLE ROW LEVEL SECURITY;
       * CREATE POLICY "Users only see own categories" ON categories FOR ALL USING (auth.uid() = user_id);
       * 
       * CREATE TABLE transactions (
       *   id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
       *   month_key TEXT NOT NULL,
       *   user_id UUID NOT NULL DEFAULT auth.uid() REFERENCES auth.users,
       *   amount NUMERIC DEFAULT 0,
       *   category TEXT,
       *   date DATE,
       *   remark TEXT
       * );
       * ALTER TABLE transactions ENABLE ROW LEVEL SECURITY;
       * CREATE POLICY "Users only see own transactions" ON transactions FOR ALL USING (auth.uid() = user_id);
       */

      // ─────────────────────────────
      // SUPABASE CONFIG
      // ─────────────────────────────
      const SUPABASE_URL = 'https://yywcjlbcpjlosegvyfwt.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5d2NqbGJjcGpsb3NlZ3Z5Znd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODMyOTcsImV4cCI6MjA5NTI1OTI5N30.-9Jeh8Ufth2OCRPW3_rmoQxaWZE9MoyfaqZauafpP1Q';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // ─────────────────────────────
      // AUTH LOGIC
      // ─────────────────────────────
      let currentAuthMode = 'login';

      function toggleAuthTab(mode) {
        currentAuthMode = mode;
        document.getElementById('tab-login').classList.toggle('active', mode === 'login');
        document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
        document.getElementById('auth-btn').textContent = mode === 'login' ? 'Login' : 'Sign Up';
      }

      async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        if (!email || !password) return toast('Please enter email and password', true);

        toggleLoading(true);
        const { data, error } = currentAuthMode === 'login' 
          ? await supabase.auth.signInWithPassword({ email, password })
          : await supabase.auth.signUp({ email, password });

        if (error) {
          toast(error.message, true);
          toggleLoading(false);
        } else {
          toast(currentAuthMode === 'login' ? 'Logged in!' : 'Sign up successful! Please check your email.');
          // UI will auto-switch via onAuthStateChange listener
        }
      }

      async function handleLogout() {
        await supabase.auth.signOut();
        window.location.reload(); // Simplest way to clear state
      }

      supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
          document.getElementById('auth-screen').style.display = 'none';
          document.getElementById('app-container').style.display = 'block';
          document.getElementById('header-user-email').textContent = session.user.email;
          initApp();
        } else {
          document.getElementById('auth-screen').style.display = 'flex';
          document.getElementById('app-container').style.display = 'none';
        }
      });

      // ─────────────────────────────
      // CORE APP LOGIC
      // ─────────────────────────────
      const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const CAT_COLORS = { 'Eating Out':'#c9a96e','Groceries':'#56c496','Shopping':'#7c6fcd','Family & Others':'#e8a46c','Transport':'#4a9eff','Self Care':'#f472b6','Travel':'#34d399','Entertainment':'#fbbf24','Others':'#8a84a0' };
      const DEFAULT_FIXED = [ {name:'Petrol',budgeted:150,actual:''}, {name:'Bills',budgeted:50,actual:''}, {name:'Rent',budgeted:400,actual:''} ];
      const DEFAULT_CATS = [ {name:'Eating Out',budget:200},{name:'Groceries',budget:100},{name:'Shopping',budget:200} ];

      let currentYear, currentMonth, activeTab = 'overview';
      const monthCache = {};

      function monthKey(y, m) { return `${y}-${String(m).padStart(2,'0')}`; }
      function mk() { return monthKey(currentYear, currentMonth); }

      async function getMonthData(key) {
        if (monthCache[key]) return monthCache[key];
        
        const [sett, inv, fix, cats, txs] = await Promise.all([
          supabase.from('monthly_settings').select('*').eq('month_key', key).single(),
          supabase.from('invest_subs').select('*').eq('month_key', key),
          supabase.from('fixed_expenses').select('*').eq('month_key', key),
          supabase.from('categories').select('*').eq('month_key', key).order('sort_order'),
          supabase.from('transactions').select('*').eq('month_key', key).order('date', { ascending: true })
        ]);

        if (!sett.data && !cats.data?.length) {
          const def = { income: 3600, extraIncome: 0, savings: 1100, investSubs: [], fixedExpenses: JSON.parse(JSON.stringify(DEFAULT_FIXED)), categories: JSON.parse(JSON.stringify(DEFAULT_CATS)), transactions: [] };
          monthCache[key] = def;
          return def;
        }

        const data = {
          income: Number(sett.data?.income || 0),
          extraIncome: Number(sett.data?.extra_income || 0),
          savings: Number(sett.data?.savings || 0),
          investSubs: (inv.data || []).map(r => ({ id: r.id, name: r.name, amount: Number(r.amount || 0) })),
          fixedExpenses: (fix.data || []).map(r => ({ id: r.id, name: r.name, budgeted: Number(r.budgeted || 0), actual: r.actual !== null ? Number(r.actual) : '' })),
          categories: (cats.data || []).map(r => ({ id: r.id, name: r.name, budget: Number(r.budget || 0) })),
          transactions: (txs.data || []).map(r => ({ id: r.id, amount: Number(r.amount || 0), cat: r.category, date: r.date, remark: r.remark || '' }))
        };
        monthCache[key] = data;
        return data;
      }

      async function saveMonthData(data) {
        const key = mk();
        monthCache[key] = data;
        
        await supabase.from('monthly_settings').upsert({ month_key: key, income: data.income, extra_income: data.extraIncome, savings: data.savings }, { onConflict: 'month_key,user_id' });
        
        await supabase.from('invest_subs').delete().eq('month_key', key);
        if (data.investSubs?.length) await supabase.from('invest_subs').insert(data.investSubs.map(r => ({ month_key: key, name: r.name, amount: r.amount })));
        
        await supabase.from('fixed_expenses').delete().eq('month_key', key);
        if (data.fixedExpenses?.length) await supabase.from('fixed_expenses').insert(data.fixedExpenses.map(r => ({ month_key: key, name: r.name, budgeted: r.budgeted, actual: r.actual !== '' ? Number(r.actual) : null })));

        await supabase.from('categories').delete().eq('month_key', key);
        if (data.categories?.length) await supabase.from('categories').insert(data.categories.map((r, i) => ({ month_key: key, name: r.name, budget: r.budget, sort_order: i })));

        await supabase.from('transactions').delete().eq('month_key', key);
        if (data.transactions?.length) await supabase.from('transactions').insert(data.transactions.map(r => ({ month_key: key, amount: r.amount, category: r.cat, date: r.date, remark: r.remark })));
      }

      function initApp() {
        const now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth() + 1;
        updateMonthLabel();
        renderCurrentTab();
      }

      async function changeMonth(dir) {
        currentMonth += dir;
        if (currentMonth > 12) { currentMonth = 1; currentYear++; }
        if (currentMonth < 1) { currentMonth = 12; currentYear--; }
        updateMonthLabel();
        renderCurrentTab();
      }

      function updateMonthLabel() {
        const label = `${MONTHS[currentMonth-1]} ${currentYear}`;
        document.getElementById('current-month-label').textContent = label;
        ['overview','log','fixed','summary'].forEach(t => {
          const el = document.getElementById(`${t}-month-title`);
          if (el) el.textContent = label;
        });
      }

      async function showTab(name, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${name}`).classList.add('active');
        if (btn) btn.classList.add('active');
        activeTab = name;
        renderCurrentTab();
      }

      async function renderCurrentTab() {
        toggleLoading(true);
        if (activeTab === 'overview') await renderOverview();
        else if (activeTab === 'log') await renderLog();
        else if (activeTab === 'fixed') await renderFixed();
        else if (activeTab === 'summary') await renderSummary();
        else if (activeTab === 'trends') await renderTrends();
        toggleLoading(false);
      }

      function fmt(n) { return 'RM ' + Number(n||0).toFixed(2); }
      function catColor(name) { for (const [k,v] of Object.entries(CAT_COLORS)) if (name && name.toLowerCase().includes(k.toLowerCase())) return v; return '#8a84a0'; }
      function toggleLoading(show) { document.getElementById('loading-overlay').classList.toggle('active', show); }
      function toast(msg, isErr) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = isErr ? 'error' : ''; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
      }

      // Render functions adapted from previous versions...
      async function renderOverview() {
        const data = await getMonthData(mk());
        const totalInc = (data.income||0) + (data.extraIncome||0);
        const spentTotal = data.transactions.reduce((s,tx) => s + tx.amount, 0);
        const fixTotal = data.fixedExpenses.reduce((s,r) => s + (parseFloat(r.actual)||parseFloat(r.budgeted)||0), 0);
        const savedActual = data.savings||0;
        const remaining = totalInc - fixTotal - spentTotal - savedActual;

        document.getElementById('stat-cards').innerHTML = `
          <div class="stat-card income"><div class="stat-label">Income</div><div class="stat-value">${fmt(totalInc)}</div></div>
          <div class="stat-card spent"><div class="stat-label">Spent</div><div class="stat-value">${fmt(spentTotal)}</div></div>
          <div class="stat-card balance"><div class="stat-label">Remaining</div><div class="stat-value">${fmt(remaining)}</div></div>
        `;
        
        document.getElementById('recent-tx').innerHTML = data.transactions.length ? 
          `<div class="tx-list">${data.transactions.slice(-5).reverse().map(tx => `
            <div class="tx-item">
              <span class="tx-cat-dot" style="background:${catColor(tx.cat)}"></span>
              <div class="tx-info"><div class="tx-cat-badge">${tx.cat}</div><div style="font-size:11px;color:var(--muted)">${tx.date}</div></div>
              <div class="tx-amount">− ${fmt(tx.amount)}</div>
            </div>`).join('')}</div>` : '<div style="text-align:center;color:var(--muted);padding:20px">No transactions yet</div>';
      }

      async function renderLog() {
        const data = await getMonthData(mk());
        document.getElementById('tx-cat').innerHTML = data.categories.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
        document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('all-tx').innerHTML = `<div class="tx-list">${data.transactions.slice().reverse().map((tx,i) => `
          <div class="tx-item">
            <span class="tx-cat-dot" style="background:${catColor(tx.cat)}"></span>
            <div class="tx-info"><div class="tx-cat-badge">${tx.cat}</div><div style="font-size:11px;color:var(--muted)">${tx.date}</div></div>
            <div class="tx-amount">− ${fmt(tx.amount)}</div>
            <button class="btn btn-danger" onclick="deleteTx(${data.transactions.length-1-i})">✕</button>
          </div>`).join('')}</div>`;
      }

      async function addTransaction() {
        const amount = parseFloat(document.getElementById('tx-amount').value);
        const cat = document.getElementById('tx-cat').value;
        const date = document.getElementById('tx-date').value;
        const remark = document.getElementById('tx-remark').value;
        if (!amount || !cat) return toast('Invalid data', true);
        const data = await getMonthData(mk());
        data.transactions.push({ amount, cat, date, remark, id: Date.now() });
        await saveMonthData(data);
        renderLog();
      }

      async function deleteTx(idx) {
        const data = await getMonthData(mk());
        data.transactions.splice(idx, 1);
        await saveMonthData(data);
        renderLog();
      }

      async function renderFixed() {
        const data = await getMonthData(mk());
        document.getElementById('fix-income').value = data.income;
        document.getElementById('fix-extra-income').value = data.extraIncome;
        document.getElementById('fix-savings').value = data.savings;
        document.getElementById('fixed-table-body').innerHTML = data.fixedExpenses.map((r,i) => `
          <tr>
            <td><input value="${r.name}" onchange="updateFixedLocal(${i},'name',this.value)"></td>
            <td><input type="number" value="${r.budgeted}" onchange="updateFixedLocal(${i},'budgeted',this.value)"></td>
            <td><input type="number" value="${r.actual}" onchange="updateFixedLocal(${i},'actual',this.value)"></td>
            <td><button class="btn btn-danger" onclick="removeFixedRow(${i})">✕</button></td>
          </tr>`).join('');
        document.getElementById('cat-budget-inputs').innerHTML = data.categories.map((c,i) => `
          <div class="form-row">
            <input value="${c.name}" onchange="updateCatLocal(${i},'name',this.value)">
            <input type="number" value="${c.budget}" onchange="updateCatLocal(${i},'budget',this.value)">
            <button class="btn btn-danger" onclick="removeCat(${i})">✕</button>
          </div>`).join('');
      }

      function updateFixedLocal(i,k,v) { monthCache[mk()].fixedExpenses[i][k] = (k==='name'?v:parseFloat(v)||0); }
      function updateCatLocal(i,k,v) { monthCache[mk()].categories[i][k] = (k==='name'?v:parseFloat(v)||0); }
      function addFixedRow() { monthCache[mk()].fixedExpenses.push({name:'New',budgeted:0,actual:''}); renderFixed(); }
      function removeFixedRow(i) { monthCache[mk()].fixedExpenses.splice(i,1); renderFixed(); }
      function addCatBudget() { monthCache[mk()].categories.push({name:'New',budget:0}); renderFixed(); }
      function removeCat(i) { monthCache[mk()].categories.splice(i,1); renderFixed(); }
      async function saveFixed() { 
        const d = monthCache[mk()];
        d.income = parseFloat(document.getElementById('fix-income').value)||0;
        d.extraIncome = parseFloat(document.getElementById('fix-extra-income').value)||0;
        d.savings = parseFloat(document.getElementById('fix-savings').value)||0;
        await saveMonthData(d);
        toast('Settings Saved');
      }

      async function renderSummary() {
        const data = await getMonthData(mk());
        const totalInc = (data.income||0)+(data.extraIncome||0);
        const spentTotal = data.transactions.reduce((s,tx) => s + tx.amount, 0);
        const fixTotal = data.fixedExpenses.reduce((s,r) => s + (parseFloat(r.actual)||parseFloat(r.budgeted)||0), 0);
        const savedActual = data.savings||0;
        const remaining = totalInc - fixTotal - spentTotal - savedActual;

        document.getElementById('summary-content').innerHTML = `
          <div class="card">
            <div class="card-title">Month Totals</div>
            <div style="display:flex; justify-content:space-between; margin-bottom:10px"><span>Total Income</span><strong>${fmt(totalInc)}</strong></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:10px"><span>Total Fixed</span><strong style="color:var(--red)">${fmt(fixTotal)}</strong></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:10px"><span>Total Variable</span><strong style="color:var(--red)">${fmt(spentTotal)}</strong></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:10px"><span>Savings</span><strong style="color:var(--accent2)">${fmt(savedActual)}</strong></div>
            <hr style="border:0; border-top:1px solid var(--border); margin:10px 0">
            <div style="display:flex; justify-content:space-between"><span>Remaining</span><strong style="color:var(--green)">${fmt(remaining)}</strong></div>
          </div>
        `;
      }

      async function renderTrends() {
        const months = [];
        for (let i = 5; i >= 0; i--) {
          let m = currentMonth - i, y = currentYear;
          while (m <= 0) { m += 12; y--; }
          months.push({ year: y, month: m, label: MONTHS[m-1].slice(0,3) });
        }
        const trendData = await Promise.all(months.map(m => getMonthData(monthKey(m.year, m.month))));
        
        document.getElementById('trend-table-wrap').innerHTML = `
          <table class="fix-table">
            <thead><tr><th>Month</th><th>Spent</th><th>Fixed</th></tr></thead>
            <tbody>${months.map((m,i) => {
              const d = trendData[i];
              const st = d.transactions.reduce((s,tx)=>s+tx.amount,0);
              const fx = d.fixedExpenses.reduce((s,r)=>s+(parseFloat(r.actual)||parseFloat(r.budgeted)||0),0);
              return `<tr><td>${m.label}</td><td>${fmt(st)}</td><td>${fmt(fx)}</td></tr>`;
            }).join('')}</tbody>
          </table>
        `;
      }
    </script>
  </body>
</html>
